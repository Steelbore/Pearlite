[graph]
all-features = true

[advisories]
yanked = "deny"
unmaintained = "workspace"
# RUSTSEC-2026-0009 — time 0.3.45 has a parse-time stack-exhaustion DoS. The
# fix in time 0.3.47 raised MSRV to 1.88 which conflicts with our pinned
# 1.85 (Plan §4.5). Pearlite never feeds untrusted strings to `time::parse`:
# we only use the crate for serializing/deserializing machine-emitted
# ISO 8601 in state.toml and plan.json. The DoS surface is therefore not
# reachable through any Pearlite API.
#
# TODO(M1 close): write ADR-008 deciding when to bump MSRV; remove this
# ignore once MSRV >= 1.88.
ignore = ["RUSTSEC-2026-0009"]

[licenses]
allow = [
    "GPL-3.0-or-later",
    "GPL-3.0",
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
