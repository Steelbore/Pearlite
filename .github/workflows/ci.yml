name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# TODO(M1): each job should run inside a CachyOS container once the image is
# published to GHCR (or we publish a custom one). M0 lint/build/test only
# exercises Rust + POSIX tooling, so plain ubuntu-latest is sufficient and
# unblocks the first PR.

jobs:
  lint:
    name: T1 — Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy
      - uses: extractions/setup-just@v3
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete
      - run: just check
      - run: just spdx
      - run: just unused

  test:
    name: T2 — Unit
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v3
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,nickel-lang-cli
      - run: just test
      - run: just test-doc

  audit:
    name: T3 — Adapter / audit
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v3
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - run: just audit
      - run: just compliance
