name: Release

# Triggered only by tag pushes matching v*. Builds a signed release tarball
# via cargo-dist and creates the GitHub Release. Skeleton only at M0; the
# signing key, cargo-dist config, and AUR push step land in M6.

on:
  push:
    tags: ['v*']

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    container: ghcr.io/cachyos/cachyos:latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-dist
        run: cargo install cargo-dist --locked
      - name: Plan release
        run: cargo dist plan
      - name: Build release tarball
        run: cargo dist build --target x86_64-unknown-linux-gnu
      # TODO(M6): sequoia-chameleon-gnupg sign tarball using secret key.
      # TODO(M6): create GitHub Release attaching tarball + signature.
      # TODO(M6): aurpublish update for pearlite-bin PKGBUILD.
